version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: certpulse-postgres
    restart: always
    environment:
      POSTGRES_DB: certpulse
      POSTGRES_USER: certpulse_user
      POSTGRES_PASSWORD: certpulse_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: certpulse-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certpulse-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgres://certpulse_user:certpulse_password@postgres:5432/certpulse?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - PORT=5000
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: certpulse-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

  adminer:
    image: adminer:latest
    container_name: certpulse-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
  redisdata:
